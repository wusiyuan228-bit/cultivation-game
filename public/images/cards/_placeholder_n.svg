<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="nBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="50%" stop-color="#3a3a42"/>
      <stop offset="100%" stop-color="#1a1a1d"/>
    </linearGradient>
    <radialGradient id="nAura" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0%" stop-color="#b0b0b5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6a6a70" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#nBg)"/>
  <circle cx="300" cy="336" r="250" fill="url(#nAura)"/>
  <!-- 人物剪影（凡人·布衣） -->
  <g transform="translate(300, 400)" fill="#15151a" opacity="0.88">
    <ellipse cx="0" cy="-80" rx="55" ry="66"/>
    <path d="M-102,24 Q-102,-22 -50,-28 L50,-28 Q102,-22 102,24 L102,180 L-102,180 Z"/>
  </g>
  <!-- 边框装饰 -->
  <rect x="12" y="12" width="576" height="776" fill="none" stroke="#8a8a8a" stroke-width="3" rx="6"/>
  <rect x="20" y="20" width="560" height="760" fill="none" stroke="#b8b8b8" stroke-width="1" opacity="0.35" rx="3"/>
  <!-- 左上 N 标识 -->
  <rect x="36" y="36" width="66" height="36" fill="#8a8a8a" rx="4"/>
  <text x="69" y="62" font-family="'Noto Serif SC', serif" font-size="22" font-weight="900" fill="#1a1a1d" text-anchor="middle">N</text>
  <!-- 底部装饰文字 -->
  <text x="300" y="740" font-family="'Noto Serif SC', serif" font-size="26" font-weight="700" fill="#c0c0c0" text-anchor="middle" opacity="0.6" letter-spacing="8">平凡·修士</text>
</svg>
