<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bgJia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2820"/>
      <stop offset="60%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </linearGradient>
    <radialGradient id="glowJia" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="rgba(200,80,47,0.35)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="robeJia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b3a22"/>
      <stop offset="100%" stop-color="#4a1a0e"/>
    </linearGradient>
    <linearGradient id="skinJia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c49c"/>
      <stop offset="100%" stop-color="#a88068"/>
    </linearGradient>
    <linearGradient id="swordJia" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d0b8"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9a9080"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="800" fill="url(#bgJia)"/>
  <ellipse cx="300" cy="340" rx="320" ry="380" fill="url(#glowJia)"/>

  <!-- 光柱线条 -->
  <g opacity="0.15" stroke="#c8814b" stroke-width="1" fill="none">
    <line x1="80" y1="0" x2="180" y2="800"/>
    <line x1="420" y1="0" x2="520" y2="800"/>
    <line x1="250" y1="0" x2="280" y2="800"/>
    <line x1="350" y1="0" x2="320" y2="800"/>
  </g>

  <!-- 长剑（斜挎） -->
  <g transform="rotate(-20 300 500)">
    <rect x="290" y="240" width="20" height="400" fill="url(#swordJia)" stroke="#2a1a0a" stroke-width="2"/>
    <rect x="270" y="640" width="60" height="18" fill="#3a2010" stroke="#1a0a04" stroke-width="2"/>
    <rect x="282" y="655" width="36" height="80" rx="4" fill="#5a2818"/>
    <circle cx="300" cy="745" r="14" fill="#d4a04a" stroke="#8b5a1a" stroke-width="2"/>
  </g>

  <!-- 长袍主体 -->
  <path d="M 170 760 L 190 520 Q 200 440 240 400 L 360 400 Q 400 440 410 520 L 430 760 Z"
        fill="url(#robeJia)" stroke="#2a0f08" stroke-width="3"/>
  <!-- 腰带 -->
  <rect x="195" y="530" width="210" height="28" fill="#d4a04a" stroke="#6a4a1a" stroke-width="2"/>
  <rect x="290" y="530" width="20" height="80" fill="#b8802a"/>

  <!-- 肩甲 -->
  <path d="M 190 430 Q 180 400 210 380 L 240 395 L 230 440 Z" fill="#6a5030" stroke="#2a1a08" stroke-width="2"/>
  <path d="M 410 430 Q 420 400 390 380 L 360 395 L 370 440 Z" fill="#6a5030" stroke="#2a1a08" stroke-width="2"/>

  <!-- 脖子 -->
  <rect x="278" y="295" width="44" height="40" fill="url(#skinJia)"/>

  <!-- 头部 -->
  <ellipse cx="300" cy="240" rx="78" ry="92" fill="url(#skinJia)" stroke="#5a3a1a" stroke-width="2"/>

  <!-- 头发（束髻） -->
  <path d="M 225 205 Q 220 150 260 130 Q 300 118 340 130 Q 380 150 375 205 Q 375 180 300 168 Q 225 180 225 205 Z"
        fill="#1a0a04" stroke="#000" stroke-width="1"/>
  <ellipse cx="300" cy="128" rx="30" ry="22" fill="#2a1408"/>
  <rect x="292" y="100" width="16" height="40" fill="#d4a04a" stroke="#6a4a1a" stroke-width="1"/>

  <!-- 眉眼 -->
  <path d="M 255 225 Q 270 218 285 225" stroke="#1a0a04" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 315 225 Q 330 218 345 225" stroke="#1a0a04" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="270" cy="245" rx="6" ry="5" fill="#2a1008"/>
  <ellipse cx="330" cy="245" rx="6" ry="5" fill="#2a1008"/>

  <!-- 鼻 -->
  <path d="M 300 248 L 294 275 L 306 275 Z" fill="none" stroke="#8a5830" stroke-width="1.5"/>

  <!-- 嘴（严肃紧抿） -->
  <path d="M 280 292 Q 300 288 320 292" stroke="#5a2010" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 胡须轮廓 -->
  <path d="M 265 280 Q 300 305 335 280" stroke="#3a2010" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- 额前流海 -->
  <path d="M 245 195 Q 270 210 295 198 Q 320 210 355 195" stroke="#1a0a04" stroke-width="4" fill="none"/>

  <!-- 下方签名暗纹（剑派徽章） -->
  <g transform="translate(300 720)" opacity="0.45">
    <circle r="32" fill="none" stroke="#c8814b" stroke-width="2"/>
    <path d="M 0 -22 L 4 -6 L 20 -4 L 8 6 L 12 22 L 0 12 L -12 22 L -8 6 L -20 -4 L -4 -6 Z"
          fill="#c8814b"/>
  </g>
</svg>
