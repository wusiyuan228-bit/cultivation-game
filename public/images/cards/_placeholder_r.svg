<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="rBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3d2a"/>
      <stop offset="50%" stop-color="#2d5a3d"/>
      <stop offset="100%" stop-color="#0f2418"/>
    </linearGradient>
    <linearGradient id="rGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9a6a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2d6d45" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rAura" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0%" stop-color="#7fd49f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4a9a6a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#rBg)"/>
  <rect width="600" height="800" fill="url(#rGlow)"/>
  <circle cx="300" cy="336" r="250" fill="url(#rAura)"/>
  <!-- 人物剪影 -->
  <g transform="translate(300, 400)" fill="#0c1f14" opacity="0.85">
    <ellipse cx="0" cy="-80" rx="58" ry="70"/>
    <path d="M-110,30 Q-110,-20 -55,-30 L55,-30 Q110,-20 110,30 L110,180 L-110,180 Z"/>
    <path d="M-130,-40 L-100,-60 L-95,-50 L-110,-30 Z M130,-40 L100,-60 L95,-50 L110,-30 Z" opacity="0.6"/>
  </g>
  <!-- 光点粒子 -->
  <circle cx="120" cy="180" r="3" fill="#7fd49f" opacity="0.7"/>
  <circle cx="480" cy="240" r="4" fill="#a8e4bc" opacity="0.6"/>
  <circle cx="180" cy="480" r="2" fill="#7fd49f" opacity="0.8"/>
  <circle cx="450" cy="560" r="3" fill="#a8e4bc" opacity="0.5"/>
  <circle cx="90" cy="620" r="2" fill="#7fd49f" opacity="0.6"/>
  <!-- 边框装饰 -->
  <rect x="12" y="12" width="576" height="776" fill="none" stroke="#4a9a6a" stroke-width="3" rx="6"/>
  <rect x="20" y="20" width="560" height="760" fill="none" stroke="#7fd49f" stroke-width="1" opacity="0.4" rx="3"/>
  <!-- 左上 R 标识 -->
  <rect x="36" y="36" width="66" height="36" fill="#4a9a6a" rx="4"/>
  <text x="69" y="62" font-family="'Noto Serif SC', serif" font-size="22" font-weight="900" fill="#0c1f14" text-anchor="middle">R</text>
  <!-- 底部装饰文字 -->
  <text x="300" y="740" font-family="'Noto Serif SC', serif" font-size="26" font-weight="700" fill="#a8e4bc" text-anchor="middle" opacity="0.7" letter-spacing="8">稀有·修士</text>
</svg>
